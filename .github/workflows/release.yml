name: Build, Sign, Notarize & Release SerialProbe

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Import Developer ID Certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Get Signing Identity
        id: signing
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -n 1 | awk -F'"' '{print $2}')
          echo "identity=$IDENTITY" >> $GITHUB_OUTPUT
          echo "✅ 使用签名身份: $IDENTITY"

      - name: Archive SerialProbe (强制 Developer ID 签名)
        run: |
          xcodebuild archive \
            -project SerialProbe.xcodeproj \
            -scheme SerialProbe \
            -configuration Release \
            -archivePath ./build/SerialProbe.xcarchive \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="${{ steps.signing.outputs.identity }}" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="H2NS3XTS96"

      - name: Export .app (Developer ID)
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/SerialProbe.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./dist \
            -allowProvisioningUpdates

      - name: Verify exported app
        run: |
          ls -lh ./dist
          codesign -dv --verbose=4 ./dist/SerialProbe.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "SerialProbe" \
            --window-pos 200 120 \
            --window-size 800 500 \
            --text-size 16 \
            --icon-size 128 \
            --icon "SerialProbe.app" 280 220 \
            --hide-extension "SerialProbe.app" \
            --app-drop-link 520 220 \
            --no-internet-enable \
            "./dist/SerialProbe.dmg" \
            "./dist/SerialProbe.app"

      - name: Codesign DMG
        run: |
          codesign --force --sign "${{ steps.signing.outputs.identity }}" "./dist/SerialProbe.dmg"

      - name: Notarize DMG with API Key
        run: |
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > $RUNNER_TEMP/AuthKey.p8
          chmod 600 $RUNNER_TEMP/AuthKey.p8

          xcrun notarytool submit "./dist/SerialProbe.dmg" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "${{ secrets.APPLE_API_KEY_ID }}" \
            --issuer "${{ secrets.APPLE_API_ISSUER }}" \
            --wait

          rm -f $RUNNER_TEMP/AuthKey.p8

      - name: Staple ticket
        run: |
          xcrun stapler staple "./dist/SerialProbe.dmg"
          echo "✅ 公证完成并附加票据"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/SerialProbe.dmg
          tag_name: ${{ github.ref_name }}
          name: SerialProbe ${{ github.ref_name }}
          generate_release_notes: true
