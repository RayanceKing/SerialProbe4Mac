name: Build, Sign, Notarize & Release SerialProbe

on:
  push:
    tags:
      - 'v*'          # 推送 v1.0.0 等 tag 时自动触发

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Import Developer ID Certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Archive SerialProbe
        run: |
          xcodebuild archive \
            -project SerialProbe.xcodeproj \
            -scheme SerialProbe \
            -configuration Release \
            -archivePath ./build/SerialProbe.xcarchive \
            -destination 'platform=macOS'

      - name: Export .app (Developer ID)
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/SerialProbe.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./dist

      - name: Verify exported app
        run: |
          ls -lh ./dist
          codesign -dv --verbose=4 ./dist/SerialProbe.app

      - name: Install create-dmg tool
        run: brew install create-dmg

      - name: Create beautiful DMG
        run: |
          create-dmg \
            --volname "SerialProbe" \
            --volicon "SerialProbe/Assets.xcassets/AppIcon.appiconset/icon_512x512.png" \   # 可选：替换为你的图标路径
            --window-pos 200 120 \
            --window-size 800 500 \
            --text-size 16 \
            --icon-size 128 \
            --icon "SerialProbe.app" 280 220 \
            --hide-extension "SerialProbe.app" \
            --app-drop-link 520 220 \
            --no-internet-enable \
            --hdiutil-verbose \
            "./dist/SerialProbe.dmg" \
            "./dist/SerialProbe.app"

      - name: Codesign the DMG (optional but recommended)
        run: |
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -n 1 | awk -F'"' '{print $2}')
          codesign --force --sign "$IDENTITY" "./dist/SerialProbe.dmg"

      - name: Notarize DMG with App Store Connect API Key
        run: |
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > $RUNNER_TEMP/AuthKey.p8
          chmod 600 $RUNNER_TEMP/AuthKey.p8

          xcrun notarytool submit "./dist/SerialProbe.dmg" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "${{ secrets.APPLE_API_KEY_ID }}" \
            --issuer "${{ secrets.APPLE_API_ISSUER }}" \
            --wait

          rm -f $RUNNER_TEMP/AuthKey.p8

      - name: Staple ticket to DMG
        run: |
          xcrun stapler staple "./dist/SerialProbe.dmg"
          echo "✅ SerialProbe.dmg 已完成公证并附加票据"

      - name: Create GitHub Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/SerialProbe.dmg
          tag_name: ${{ github.ref_name }}
          name: SerialProbe ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
